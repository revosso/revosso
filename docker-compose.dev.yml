# Development: hot reload, source bind-mount, no full rebuild on file changes
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: development
    volumes:
      - .:/app
      - revosso_node_modules:/app/node_modules
      - revosso_next:/app/.next
    command: ["pnpm", "dev", "--hostname", "0.0.0.0", "--port", "3000"]

volumes:
  revosso_node_modules:
  revosso_next:
